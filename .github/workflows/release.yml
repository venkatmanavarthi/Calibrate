name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v0.2.0)'
        required: true
        default: 'v0.1.0'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package (Mac)
        if: matrix.platform == 'mac'
        run: bunx electron-builder --mac --config.mac.hardenedRuntime=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Package (Windows)
        if: matrix.platform == 'win'
        run: bunx electron-builder --win

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: bunx electron-builder --linux

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: Calibrate ${{ inputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
