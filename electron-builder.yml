appId: com.calibrate.app
productName: Calibrate
copyright: Copyright © 2026 Calibrate

publish:
  provider: github
  owner: venkatmanavarthi
  repo: resume-maker
  releaseType: release

directories:
  output: release

files:
  - out/**/*
  - "!node_modules/**/*"

asar: true

mac:
  category: public.app-category.productivity
  icon: assets/icons/mac/icon.icns
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  entitlements: assets/entitlements.mac.plist
  entitlementsInherit: assets/entitlements.mac.plist
  notarize: false

win:
  icon: assets/icons/win/icon.ico
  target:
    - target: nsis
      arch: [x64]

linux:
  icon: assets/icons/linux/
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Office
